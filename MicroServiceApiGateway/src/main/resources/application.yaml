spring:
  application:
    name: MicroServiceApiGateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: api-1
              uri: lb://MicroServicePayment
              predicates:
                - Path=/pay/**

            - id: api-2
              uri: lb://MicroServiceOrderMedicine
              predicates:
                - Path=/api/order/**

server:
  port: 8999